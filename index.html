<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
        text-align: center;
      }

      h1 {
        margin: 20px;
      }

      /* FILTER BUTTONS */

      .filter-buttons {
        margin-bottom: 20px;
      }

      .filter-buttons button {
        padding: 10px 18px;
        border: none;
        background: #333;
        color: white;
        margin: 5px;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.3s;
      }

      .filter-buttons button:hover {
        background: #ff6b6b;
      }

      /* GALLERY GRID */

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 1100px;
        margin: auto;
      }

      .gallery img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition:
          transform 0.4s,
          box-shadow 0.4s;
      }

      /* HOVER EFFECT */

      .gallery img:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      /* LIGHTBOX */

      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .lightbox img {
        max-width: 80%;
        max-height: 70%;
        border-radius: 10px;
      }

      /* CLOSE BUTTON */

      .close {
        position: absolute;
        top: 30px;
        right: 40px;
        font-size: 40px;
        color: white;
        cursor: pointer;
      }

      /* NAV BUTTONS */

      .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 40px;
        color: white;
        cursor: pointer;
        padding: 10px;
      }

      .prev {
        left: 40px;
      }

      .next {
        right: 40px;
      }

      /* RESPONSIVE */

      @media (max-width: 600px) {
        .gallery img {
          height: 180px;
        }

        .lightbox img {
          max-width: 95%;
        }
      }
    </style>
  </head>

  <body>
    <h1>Image Gallery</h1>

    <div class="filter-buttons">
      <button onclick="filterImages('all')">All</button>
      <button onclick="filterImages('nature')">Nature</button>
      <button onclick="filterImages('city')">City</button>
      <button onclick="filterImages('animals')">Animals</button>
    </div>

    <div class="gallery" id="gallery">
      <img src="https://picsum.photos/id/1015/600/400" data-category="nature" />
      <img src="https://picsum.photos/id/1011/600/400" data-category="nature" />
      <img src="https://picsum.photos/id/1016/600/400" data-category="nature" />

      <img
        src="https://picsum.photos/id/1025/600/400"
        data-category="animals"
      />
      <img
        src="https://picsum.photos/id/1024/600/400"
        data-category="animals"
      />
      <img src="https://picsum.photos/id/237/600/400" data-category="animals" />

      <img src="https://picsum.photos/id/1031/600/400" data-category="city" />
      <img src="https://picsum.photos/id/1043/600/400" data-category="city" />
      <img src="https://picsum.photos/id/1056/600/400" data-category="city" />
    </div>

    <!-- LIGHTBOX -->

    <div class="lightbox" id="lightbox">
      <span class="close" onclick="closeLightbox()">×</span>

      <span class="nav-btn prev" onclick="changeImage(-1)">❮</span>

      <img id="lightbox-img" />

      <span class="nav-btn next" onclick="changeImage(1)">❯</span>
    </div>

    <script>
      let images = document.querySelectorAll(".gallery img");
      let lightbox = document.getElementById("lightbox");
      let lightboxImg = document.getElementById("lightbox-img");

      let currentIndex = 0;

      /* OPEN LIGHTBOX */

      images.forEach((img, index) => {
        img.addEventListener("click", () => {
          lightbox.style.display = "flex";
          lightboxImg.src = img.src;
          currentIndex = index;
        });
      });

      /* CLOSE */

      function closeLightbox() {
        lightbox.style.display = "none";
      }

      /* NEXT / PREV */

      function changeImage(step) {
        currentIndex += step;

        if (currentIndex < 0) {
          currentIndex = images.length - 1;
        }

        if (currentIndex >= images.length) {
          currentIndex = 0;
        }

        lightboxImg.src = images[currentIndex].src;
      }

      /* FILTER */

      function filterImages(category) {
        images.forEach((img) => {
          if (category === "all" || img.dataset.category === category) {
            img.style.display = "block";
          } else {
            img.style.display = "none";
          }
        });
      }

      /* KEYBOARD SUPPORT */

      document.addEventListener("keydown", (e) => {
        if (lightbox.style.display === "flex") {
          if (e.key === "ArrowRight") {
            changeImage(1);
          }

          if (e.key === "ArrowLeft") {
            changeImage(-1);
          }

          if (e.key === "Escape") {
            closeLightbox();
          }
        }
      });
    </script>
  </body>
</html>
