<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .calculator {
        background: #1e1e2f;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .display {
        width: 100%;
        height: 60px;
        background: #111;
        color: #0f0;
        font-size: 26px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        transform: scale(1.05);
      }

      .number {
        background: #2e2e40;
        color: white;
      }

      .operator {
        background: #ff9500;
        color: white;
      }

      .equal {
        background: #28a745;
        color: white;
        grid-column: span 2;
      }

      .clear {
        background: #dc3545;
        color: white;
        grid-column: span 2;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <input type="text" id="display" class="display" disabled />

      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="number" onclick="append('0')">0</button>

        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>

    <script>
      let display = document.getElementById("display");

      function append(value) {
        display.value += value;
      }

      function clearDisplay() {
        display.value = "";
      }

      function calculate() {
        try {
          display.value = eval(display.value);
        } catch {
          display.value = "Error";
        }
      }

      /* Keyboard Support */

      document.addEventListener("keydown", function (event) {
        let key = event.key;

        if (!isNaN(key) || ["+", "-", "*", "/", "."].includes(key)) {
          append(key);
        } else if (key === "Enter") {
          calculate();
        } else if (key === "Backspace") {
          display.value = display.value.slice(0, -1);
        } else if (key === "Escape") {
          clearDisplay();
        }
      });
    </script>
  </body>
</html>
